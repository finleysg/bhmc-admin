name: Deploy
run-name: "Deploy ${{ github.ref_name }}"

on:
  push:
    tags:
      - "api-v*"
      - "admin-v*"
      - "backend-v*"
      - "public-next-v*"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    if: startsWith(github.ref_name, 'api-v') || startsWith(github.ref_name, 'admin-v') || startsWith(github.ref_name, 'public-next-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build domain package
        run: pnpm --filter @repo/domain build

      - name: Determine app name
        id: app
        run: |
          TAG="${{ github.ref_name }}"
          APP="${TAG%%-v*}"
          echo "name=${APP}" >> $GITHUB_OUTPUT

      - name: Lint
        run: pnpm --filter ${{ steps.app.outputs.name }} lint

      - name: Test
        run: pnpm --filter ${{ steps.app.outputs.name }} test

  build-api:
    if: startsWith(github.ref_name, 'api-v')
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/api:latest

  deploy-api:
    if: startsWith(github.ref_name, 'api-v')
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_API_APP }}
          token: ${{ secrets.CAPROVER_API_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}

  build-backend:
    if: startsWith(github.ref_name, 'backend-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest

  deploy-backend:
    if: startsWith(github.ref_name, 'backend-v')
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_BACKEND_APP }}
          token: ${{ secrets.CAPROVER_BACKEND_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.ref_name }}

  build-admin:
    if: startsWith(github.ref_name, 'admin-v')
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_DJANGO_URL=${{ vars.NEXT_PUBLIC_DJANGO_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/admin:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/admin:latest

  deploy-admin:
    if: startsWith(github.ref_name, 'admin-v')
    runs-on: ubuntu-latest
    needs: build-admin
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_ADMIN_APP }}
          token: ${{ secrets.CAPROVER_ADMIN_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/admin:${{ github.ref_name }}

  build-public-next:
    if: startsWith(github.ref_name, 'public-next-v')
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/public-next/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_DJANGO_URL=${{ vars.NEXT_PUBLIC_DJANGO_URL }}
            NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}
            NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.NEXT_PUBLIC_GIPHY_API_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/public-next:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/public-next:latest

  deploy-public-next:
    if: startsWith(github.ref_name, 'public-next-v')
    runs-on: ubuntu-latest
    needs: build-public-next
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_PUBLIC_NEXT_APP }}
          token: ${{ secrets.CAPROVER_PUBLIC_NEXT_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/public-next:${{ github.ref_name }}
