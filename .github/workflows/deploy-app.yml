name: Deploy App
run-name: "Deploy ${{ inputs.app }} ${{ inputs.date_prefix }}"

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - api
          - admin
          - backend
          - public-next
      tag:
        description: "Version tag (auto-generated if empty)"
        required: false
        type: string
      date_prefix:
        description: "Date prefix for display (auto-computed by skill)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            DATE=$(date +%Y.%m.%d)
            PREFIX="v${DATE}"
            EXISTING=$(git tag -l "${PREFIX}.*" | sort -V | tail -1)
            if [ -z "$EXISTING" ]; then
              NUM=1
            else
              LAST_NUM=$(echo "$EXISTING" | sed "s/${PREFIX}\.//")
              NUM=$((LAST_NUM + 1))
            fi
            TAG="${PREFIX}.${NUM}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  lint-test:
    runs-on: ubuntu-latest
    needs: create-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build domain package
        run: pnpm --filter @repo/domain build

      - name: Lint
        run: pnpm --filter ${{ inputs.app }} lint

      - name: Test
        run: pnpm --filter ${{ inputs.app }} test

  build-api:
    if: inputs.app == 'api'
    runs-on: ubuntu-latest
    needs: [create-tag, lint-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ needs.create-tag.outputs.version }}
            ghcr.io/${{ github.repository }}/api:latest

  deploy-api:
    if: inputs.app == 'api'
    runs-on: ubuntu-latest
    needs: [create-tag, build-api]
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_API_APP }}
          token: ${{ secrets.CAPROVER_API_TOKEN }}
          image: ghcr.io/${{ github.repository }}/api:${{ needs.create-tag.outputs.version }}

  build-backend:
    if: inputs.app == 'backend'
    runs-on: ubuntu-latest
    needs: [create-tag]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ needs.create-tag.outputs.version }}
            ghcr.io/${{ github.repository }}/backend:latest

  deploy-backend:
    if: inputs.app == 'backend'
    runs-on: ubuntu-latest
    needs: [create-tag, build-backend]
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_BACKEND_APP }}
          token: ${{ secrets.CAPROVER_BACKEND_TOKEN }}
          image: ghcr.io/${{ github.repository }}/backend:${{ needs.create-tag.outputs.version }}

  build-admin:
    if: inputs.app == 'admin'
    runs-on: ubuntu-latest
    needs: [create-tag, lint-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_DJANGO_URL=${{ vars.NEXT_PUBLIC_DJANGO_URL }}
          tags: |
            ghcr.io/${{ github.repository }}/admin:${{ needs.create-tag.outputs.version }}
            ghcr.io/${{ github.repository }}/admin:latest

  deploy-admin:
    if: inputs.app == 'admin'
    runs-on: ubuntu-latest
    needs: [create-tag, build-admin]
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_ADMIN_APP }}
          token: ${{ secrets.CAPROVER_ADMIN_TOKEN }}
          image: ghcr.io/${{ github.repository }}/admin:${{ needs.create-tag.outputs.version }}

  build-public-next:
    if: inputs.app == 'public-next'
    runs-on: ubuntu-latest
    needs: [create-tag, lint-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/public-next/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_DJANGO_URL=${{ vars.NEXT_PUBLIC_DJANGO_URL }}
            NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}
            NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.NEXT_PUBLIC_GIPHY_API_KEY }}
          tags: |
            ghcr.io/${{ github.repository }}/public-next:${{ needs.create-tag.outputs.version }}
            ghcr.io/${{ github.repository }}/public-next:latest

  deploy-public-next:
    if: inputs.app == 'public-next'
    runs-on: ubuntu-latest
    needs: [create-tag, build-public-next]
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_URL }}
          app: ${{ vars.CAPROVER_PUBLIC_NEXT_APP }}
          token: ${{ secrets.CAPROVER_PUBLIC_NEXT_TOKEN }}
          image: ghcr.io/${{ github.repository }}/public-next:${{ needs.create-tag.outputs.version }}
